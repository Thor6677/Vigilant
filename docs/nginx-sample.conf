# Sample nginx vhost for vigilant — single-app deploys.
#
# Vigilant's `app` service exposes port 8000 internally on the `web`
# Docker bridge. It does NOT bind 80/443 itself. Run vigilant behind
# any reverse proxy that can reach the bridge.
#
# This sample is the minimum viable setup if you're hosting only
# vigilant. If you're co-hosting other apps behind a shared nginx,
# treat this as a starting point and use a layout like /opt/edge/.
#
# Assumptions:
#   - The container is reachable as `vigilant-app-1:8000` on the
#     `web` bridge (default name compose generates).
#   - You've placed your TLS cert at /etc/nginx/ssl/origin.{pem,key}
#     (Cloudflare Origin certs work; so does Let's Encrypt — adjust
#     paths to match your renewal layout).
#   - Your nginx container also attaches to the `web` bridge.
#
# After installing, validate with `nginx -t` then reload.

# Per-IP rate limit. 30 r/s sustained, 60-burst absorbed. Adjust to
# your traffic profile.
limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;
limit_req_status 429;

# Standard websocket / SSE upgrade map.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name vigilant.example.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name vigilant.example.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Image host caps uploads at 10 MB; +2 MB headroom for multipart overhead.
    client_max_body_size 12M;

    # Bigger proxy buffers so non-streaming responses (e.g. logo.png) don't
    # spill to disk.
    proxy_buffer_size 16k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # Re-resolve the upstream container at request time so a vigilant
    # rebuild (which gives `vigilant-app-1` a new IP) is picked up
    # without an nginx reload.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $app_upstream "http://vigilant-app-1:8000";

    location /static/ {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /healthz {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        limit_req zone=app burst=60 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
