user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    # Aligned with vigilant.conf's 12M override so there's a single source of
    # truth — the app caps uploads at 10M, +2M headroom for multipart overhead.
    client_max_body_size 12M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Per-IP request budget. Burst absorbs short spikes (htmx polls land in
    # waves); nodelay rejects only when the burst bucket is also full.
    limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;
    limit_req_status 429;

    # Standard WebSocket / SSE upgrade map — sets Connection: upgrade only
    # when the client requests an upgrade, and Connection: close otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
