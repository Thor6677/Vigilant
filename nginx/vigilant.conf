# Mozilla "intermediate" cipher list (2026-04). Drops 3DES/SHA1/CBC-only.
# Refresh from https://ssl-config.mozilla.org/ when rotating.

server {
    listen 80;
    server_name vigilant.thunderborn.dev www.vigilant.thunderborn.dev mapper.thunderborn.dev;

    # Pre-route certbot/ACME challenges if we ever switch off Cloudflare Origin
    # certs. Harmless on the current Cloudflare-Origin setup.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Wanderer wormhole mapper co-host — reverse-proxy to the wanderer container
# on the shared external `web` bridge network.
server {
    listen 443 ssl;
    http2 on;
    server_name mapper.thunderborn.dev;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # Phoenix LiveView needs generous buffer + long-lived WebSockets
    client_max_body_size 12M;
    proxy_buffer_size 16k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # Use Docker's embedded DNS (127.0.0.11) with a variable so nginx
    # resolves `wanderer` at request time, not at startup. Keeps nginx
    # healthy even if the wanderer container is briefly down.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $wanderer_upstream "http://wanderer:8000";
        proxy_pass $wanderer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name vigilant.thunderborn.dev www.vigilant.thunderborn.dev;

    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    # CSP is in report-only mode initially — Jinja templates and htmx use a
    # mix of inline scripts/styles that need an audit before we can switch
    # to enforcement. Browser console logs violations under "Content
    # Security Policy" so we can tighten over time.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Allow image host uploads (10 MB cap enforced in app, +1 MB headroom)
    client_max_body_size 12M;

    # Larger proxy buffers to avoid spilling responses (like logo.png) to disk
    proxy_buffer_size 16k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;

    # Deferred DNS for the `app` upstream so nginx re-resolves it at request
    # time. Important when the deploy script recreates only the `app`
    # container (keeping nginx running) — Docker gives app a new IP, and
    # without this nginx would 502 with a cached stale IP until reload.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $app_upstream "http://app:8000";

    # Static files — proxy to app but with aggressive browser caching
    location /static/ {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Star map React SPA — cache built assets aggressively
    location /map/assets/ {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Star map data files — moderate caching (may update with SDE refreshes)
    location /map/data/ {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1d;
        add_header Cache-Control "public";
    }

    # Healthcheck endpoint — bypass the per-IP rate limit so monitoring stays
    # responsive under load. Cheap (returns {"ok":true}).
    location = /healthz {
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        # Per-IP rate limit: 30 r/s sustained, 60-burst absorbed without delay.
        limit_req zone=app burst=60 nodelay;

        proxy_pass $app_upstream;
        # Upgrade headers so future SSE / WebSocket endpoints work without
        # another nginx config change.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
