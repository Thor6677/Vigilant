{% extends "base.html" %}
{% block title %}Wormhole Map — VIGILANT{% endblock %}

{% block head %}
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style nonce="{{ request.state.csp_nonce }}">
    .b-main { padding: 0 !important; margin: 0 !important; max-width: none !important; }
    .b-footer { display: none !important; }
    #map-root {
        width: 100%;
        height: calc(100vh - 48px);
        overflow: hidden;
        position: relative;
        background: #080808;
    }
    #map-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: var(--muted);
        gap: 1rem;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }
    #map-loading .spinner {
        width: 28px; height: 28px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    /* @keyframes spin now provided globally by design-system/css/motion.css — do not redefine here. */
</style>
{% endblock %}

{% block content %}
<div id="map-root" data-space="w">
    <div id="map-loading">
        <div class="spinner"></div>
        Loading wormhole map...
    </div>
</div>

{% if entry_js %}
{% for js in preload_js %}
<link rel="modulepreload" crossorigin href="{{ js }}">
{% endfor %}
<script nonce="{{ request.state.csp_nonce }}" type="module" crossorigin src="{{ entry_js }}"></script>
{% else %}
<script nonce="{{ request.state.csp_nonce }}">document.getElementById('map-loading').innerHTML = '<span style="color:var(--danger)">Star map not built. Run: cd frontend && npm run build</span>';</script>
{% endif %}
{% endblock %}
