<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CapsuleerAI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eve: {
                            bg: '#0a0e17',
                            surface: '#0f1520',
                            border: '#1e2d45',
                            accent: '#4a9eff',
                            gold: '#c8a951',
                            danger: '#ff4444',
                            success: '#44bb44',
                            muted: '#6b7a99',
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0e17; font-family: 'JetBrains Mono', monospace; }
        .eve-glow { box-shadow: 0 0 20px rgba(74, 158, 255, 0.15); }
        .eve-border { border: 1px solid #1e2d45; }
        .scrollbar-eve::-webkit-scrollbar { width: 4px; }
        .scrollbar-eve::-webkit-scrollbar-track { background: #0a0e17; }
        .scrollbar-eve::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 2px; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(74, 158, 255, 0.3); }
            50% { box-shadow: 0 0 20px rgba(74, 158, 255, 0.6); }
        }
        .aura-pulse { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen text-gray-200">

{% if request.session.get('active_character_id') %}
<nav class="eve-border border-b bg-eve-surface sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
        <a href="/dashboard" class="text-eve-accent font-semibold tracking-widest text-sm uppercase">
            ◈ CapsuleerAI
        </a>
        <div class="flex items-center gap-6 text-sm">
            <a href="/dashboard" class="text-eve-muted hover:text-white transition-colors">Dashboard</a>
            <a href="/characters" class="text-eve-muted hover:text-white transition-colors">Characters</a>
            <a href="/skills" class="text-eve-muted hover:text-white transition-colors">Skills</a>
            <a href="/status" class="text-eve-muted hover:text-white transition-colors">ESI Status</a>
            <a href="/auth/login" class="text-eve-muted hover:text-white transition-colors">+ Add Character</a>
            <a href="/auth/logout" class="text-eve-danger hover:text-red-300 transition-colors">Logout</a>
        </div>
    </div>
</nav>
<div id="esi-banner"
     hx-get="/status/banner"
     hx-trigger="load, every 30s"
     hx-swap="outerHTML"></div>
{% endif %}

<main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
</main>

</body>
</html>
