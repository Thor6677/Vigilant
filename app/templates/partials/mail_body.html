{# Single mail body — loaded via htmx when clicking a mail #}
<div class="b-panel" style="margin-top:0.5rem;">
    <div class="b-panel-head" style="display:flex;justify-content:space-between;align-items:center;">
        <span class="b-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ subject }}</span>
        <span style="font-size:10px;color:var(--muted);flex-shrink:0;">{{ timestamp }}</span>
    </div>
    {% if sender_name %}
    <div style="padding:0.4rem 0.75rem;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);">
        From: <span style="color:var(--text);">{{ sender_name }}</span>
        {% if recipients %}· To: {{ recipients|join(', ') }}{% endif %}
    </div>
    {% endif %}
    <div style="padding:0.75rem;font-size:11px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;">{{ body }}</div>
</div>
