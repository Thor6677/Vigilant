{# Single mail body — loaded inline below the mail header #}
<div style="border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);">
    <div style="padding:0.4rem 0.75rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);">
        <span style="font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ subject }}</span>
        <span style="font-size:9px;color:var(--muted);flex-shrink:0;margin-left:0.5rem;">{{ timestamp }}</span>
    </div>
    {% if sender_name %}
    <div style="padding:0.3rem 0.75rem;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);">
        From: <span style="color:var(--text);">{{ sender_name }}</span>
        {% if recipients %}· To: {{ recipients|join(', ') }}{% endif %}
    </div>
    {% endif %}
    <div style="padding:0.75rem;font-size:11px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;">{{ body }}</div>
</div>
